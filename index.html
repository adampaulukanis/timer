<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>My Timer</title>
        <meta name="author" content="Adam" />
        <link href="style.css" rel="stylesheet" />
        <link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />
    </head>
    <body>
        <main class="container">
            <div class="ctrl">
                <div class="progressCircle">
                    <svg viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="25" class="circle" />
                        <!-- punkty kontrolne: godz. 12, 3, 6, 9
                        <circle cx="50" cy="1" r="1" fill="black" />
                        <circle cx="1" cy="50" r="1" fill="black" />
                        <circle cx="50" cy="99" r="1" fill="black" />
                        <circle cx="99" cy="50" r="1" fill="black" />
                        -->
                    </svg>
                </div>
                <div class="progressBarInfo">
                    <span class="minute"></span>:<span class="second"></span>
                </div>
                <p>Jak to działa? Klik <a href="./howItWorks.html">tutaj</a></p>
            </div>
        </main>

        <script src="main.js"></script>
    </body>
</html>
