<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Timer SVG JS</title>
<style>
* {box-sizing: border-box;}
html { height: 100%; }
body { background: pink; font-size: 2rem; }
#timer {
  height: 300px;
  width: 300px;
  border:1px solid blue;
}
</style>
</head>
<body>
<svg id="timer">
  <!--
  <line x1="150" y1="150" x2="300" y2="100" style="stroke:#006600;"></line>
  <line x1="150" y1="150" x2="300" y2="300" style="stroke:black; stroke-width:10"></line>
  -->
  <circle id="circle" cx="150" cy="150" r="113" stroke="green" stroke-width="4" fill="yellow"></circle>
  <circle id="godz" cx="150" cy="150" r="15" stroke="black"></circle>
  <circle id="minuta" cx="150" cy="150" r="10" stroke="brown" fill="brown"></circle>
  <circle id="sekunda" cx="150" cy="150" r="5" stroke="red" fill="blue"></circle>
  Sorry, your browser does not support inline SVG.
</svg>
<br>
<output id="output"></output>
<script>
var svg = document.getElementById('svg');
var circle = document.getElementById('circle');
var output = document.getElementById('output');
var sekunda = document.getElementById('sekunda');
var minuta = document.getElementById('minuta');
var godz = document.getElementById('godz');
</script>




<script>
var timerFunction = null;

function startAnimation() {
  if(timerFunction == null) {
    timerFunction = setInterval(kropki, 1000);
  }
}

function stopAnimation() {
  if(timerFunction != null){
    clearInterval(timerFunction);
    timerFunction = null;
  }
}

function computeAngle(n) {
  return ((270 + (6 * n)) * 0.01745329);
}

function kropki() {
  sekunda.setAttribute('cx', 150+113*Math.cos(computeAngle(new Date().getSeconds())));
  sekunda.setAttribute('cy', 150+113*Math.sin(computeAngle(new Date().getSeconds())));

  minuta.setAttribute('cx', 150+113*Math.cos(computeAngle(new Date().getMinutes())));
  minuta.setAttribute('cy', 150+113*Math.sin(computeAngle(new Date().getMinutes())));

  /*
  godz.setAttribute('cx', 150+113*Math.cos(computeAngle(new Date().getHours()-12)));
  godz.setAttribute('cy', 150+113*Math.sin(computeAngle(new Date().getHours()-12)));
  */

  var jestGodz = new Date().getHours();
  godz.setAttribute('cx', 150+113*Math.cos(computeAngle(jestGodz * 5)));
  godz.setAttribute('cy', 150+113*Math.sin(computeAngle(jestGodz * 5)));

  output.innerText = new Date();
}



//animate();
startAnimation();
</script>
</body>
</html>
