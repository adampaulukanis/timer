<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>My Timer</title>
        <meta name="author" content="Adam">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main class="container">
            <div class="timer">
                <div class="progress">
                    <a id="play-stop" href>▶</a>
                </div>
                <div class="display">
                    <div class="name">
                        <input type="text" value="Timer 1">
                    </div>
                    <div class="time">
                        <input type="time"
                               name="time"
                               min="00:00"
                               max="24:00"
                               value="00:15:00"
                               step="1"
                               required
                               pattern="[0-9]{2}:[0-9]{2}:[0-9]{2}">
                        <span class="validity"></span>
                    </div>
                </div>
            </div>
            <div class="timer status-add">
                <a href>+</a>
            </div>
        </main>
        <script src="main.js"></script>
    </body>
</html>
