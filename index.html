<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>My Timer</title>
        <meta name="author" content="Adam" />
        <link rel="stylesheet" href="style.css" />
        <link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />
    </head>
    <body>
        <main class="container">
            <div class="timer">
                <div class="progress">
                    <a id="play-stop" class="fa fa-play" href></a>
                </div>
                <div class="display">
                    <div class="name">
                        <input type="text" value="Timer 1" />
                    </div>
                    <div class="time">
                        <input
                            id="set-time"
                            type="time"
                            name="time"
                            min="00:00"
                            max="24:00"
                            value="00:15:00"
                            step="1"
                            required
                            pattern="[0-9]{2}:[0-9]{2}:[0-9]{2}"
                        />
                        <span class="validity"></span>
                    </div>
                </div>
            </div>
            <div class="timer status-add">
                <a href>+</a>
            </div>
        </main>

        <audio controls src="./bell.wav" style="display: none"></audio>

        <section>
            <a class="triangle-right" href></a>
        </section>
        <div class="cross"></div>

        <script src="main.js"></script>
    </body>
</html>
