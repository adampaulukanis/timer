<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>My Timer</title>
        <meta name="author" content="Adam" />
        <link href="style.css" rel="stylesheet" />
        <link rel="shortcut icon" type="image/x-icon" href="favicon.ico" />
    </head>
    <body>
        <main class="container">
            <div class="timer">
                <a class="restart" href></a>
                <div class="progress">
                    <a class="triangle-right" href></a>
                </div>
                <div class="display">
                    <div class="name">
                        <input type="text" value="Timer 1" />
                    </div>
                    <div class="time">
                        <input
                            id="set-time"
                            type="time"
                            name="time"
                            min="00:00"
                            max="24:00"
                            value="00:15:01"
                            step="1"
                            required
                            pattern="[0-9]{2}:[0-9]{2}:[0-9]{2}"
                        />
                        <span class="validity"></span>
                    </div>
                </div>
            </div>
            <div class="timer status-add">
                <a href>+</a>
            </div>
        </main>

        <audio controls src="./bell.mp3" style="display: none"></audio>

        <footer>
            <a href="https://github.com/adampaulukanis/timer"
                >Go to the source code of this super awesome timer.</a
            >
        </footer>

        <script src="main.js"></script>
    </body>
</html>
